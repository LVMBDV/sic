version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      fastify:
        patterns:
          - "fastify"
          - "@fastify/*"
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "vite"
          - "@biomejs/*"
          - "concurrently"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
