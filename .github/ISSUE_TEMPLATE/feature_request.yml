name: Feature request
description: Suggest a feature or improvement
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
      placeholder: As a self-hoster, I want X because Y.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A concrete suggestion. Sketches, API shapes, or mockups are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links to related projects, screenshots, prior art.
